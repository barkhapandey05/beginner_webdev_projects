<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jjob Application Form</title>
    <link rel ="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="apply_box">
            <h1>Job Application <span class="title_small">(Web)</span></h1>
            <form action="">
                <div class="form_container">
                    <div class="form_control">
                        <label for="first_name">First Name</label>
                        <input id="first_name" name="first_name" placeholder="Enter First Name..." type="text">
                    </div>
                    <div class="form_control">
                        <label for="last_name">Last Name</label>
                        <input id="last_name" name="last_name" placeholder="Enter Last Name..." type="text">
                    </div>
                    <div class="form_control">
                        <label for="email">Email</label>
                        <input id="email" name="email" placeholder="Enter email..." type="email">
                    </div>
                    <div class="form_control">
                        <label for="job_role">Job Role</label>
                        <select id="job_role" name="job_role">
                            <option value="">Select Job Role</option>
                            <option value="web_developer">Web Developer</option>
                            <option value="web_designer">Web Designer</option>
                            <option value="ui_ux_designer">UI/UX Designer</option>
                            <option value="project_manager">Project Manager</option>
                        </select>
                    </div>
                    <div class="textarea_control">
                        <label for="address">Address</label>
                        <textarea id="addreess" name="address" rows="4" cols="50" placeholder="Enter Address"></textarea>
                    </div>
                    <div class="form_control">
                        <label for="city">City</label>
                        <input id="city" name="city" placeholder="Enter City..." type="text">
                    </div>
                    <div class="form_control">
                        <label for="pincode">Pin Code</label>
                        <input id="pincode" name="pincode" placeholder="Enter Pin Code..." type="number">
                    </div>
                    <div class="form_control">
                        <label for="date">Date</label>
                        <input value="2026-02-13" id="date" name="date"  type="date">
                    </div>
                    <div class="form_control">
                        <label for="upload">Upload Your cv</label>
                        <input id="upload" name="upload" type="file">
                    </div>
                </div>
                <div class="button_container">
                    <button type="submit">Apply Now</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
